# Kafka API compatible broker (Redpanda) for StarQuant
# Usage: docker compose -f docker-compose.kafka.yml up -d
# C++ / Python clients: kafka_brokers: "localhost:9092"
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: sq-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:9092
    ports:
      - "9092:9092"
